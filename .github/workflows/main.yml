name: Blue-Green CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  test:
    name: 1. Tests y Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'
      - name: Instalar dependencias
        run: npm install
      - name: Ejecutar tests
        run: npm test
      - name: Ejecutar lint
        run: npm run lint

  build-and-push:
    name: 2. Build y Push imagen Docker
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Login a GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extraer metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
      - name: Build y Push imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-app:
    name: 3. Deploy contenedor Blue-Green
    needs: build-and-push
    runs-on: ubuntu-latest
    outputs:
      target_color: ${{ steps.set-color.outputs.target_color }}
      target_port: ${{ steps.set-color.outputs.target_port }}
    steps:
      - name: Deploy al docker-server via Bastion
        id: set-color
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          proxy_host: ${{ secrets.BASTION_HOST }}
          proxy_username: ${{ secrets.SERVER_USER }}
          proxy_key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Leer color activo actual
            source ~/current_deploy.env
            echo "Color activo actualmente: $ACTIVE_COLOR"

            # 2. Determinar color objetivo
            if [ "$ACTIVE_COLOR" = "blue" ]; then
              TARGET_COLOR=green
              TARGET_PORT=3002
            else
              TARGET_COLOR=blue
              TARGET_PORT=3001
            fi
            echo "Desplegando en: $TARGET_COLOR (puerto $TARGET_PORT)"

            # 3. Login a GHCR
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # 4. Descargar nueva imagen
            docker pull ghcr.io/manuelsmc/pipeline-test:main

            # 5. Detener contenedor anterior del color objetivo
            docker stop fast-api-$TARGET_COLOR || true
            docker rm fast-api-$TARGET_COLOR || true

            # 6. Desplegar nuevo contenedor
            docker run -d \
              --name fast-api-$TARGET_COLOR \
              --restart always \
              -p $TARGET_PORT:3000 \
              -e APP_COLOR=$TARGET_COLOR \
              ghcr.io/manuelsmc/pipeline-test:main

            # 7. Esperar que arranque
            sleep 5

            # 8. Verificar que responde
            curl -f http://localhost:$TARGET_PORT || exit 1
            echo "Contenedor $TARGET_COLOR respondiendo en puerto $TARGET_PORT"

            # 9. Guardar nuevo estado
            echo "ACTIVE_COLOR=$TARGET_COLOR" > ~/current_deploy.env
            echo "TARGET_COLOR=$TARGET_COLOR" >> ~/current_deploy.env
            echo "TARGET_PORT=$TARGET_PORT" >> ~/current_deploy.env
            echo "Despliegue completado. Ahora activo: $TARGET_COLOR"

  deploy-nginx:
    name: 4. Actualizar Nginx con envsubst
    needs: deploy-app
    runs-on: ubuntu-latest
    steps:
      - name: Actualizar Nginx via Bastion con envsubst
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          proxy_host: ${{ secrets.BASTION_HOST }}
          proxy_username: ${{ secrets.SERVER_USER }}
          proxy_key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Leer estado actual
            source ~/current_deploy.env
            echo "Actualizando Nginx para apuntar a: $TARGET_COLOR en puerto $TARGET_PORT"

            # 2. Descargar el template desde el repo
            curl -o /tmp/nginx.conf.template \
              https://raw.githubusercontent.com/ManuelSMC/pipeline-test/main/nginx.conf.template

            # 3. Usar envsubst para sustituir variables en el template
            export TARGET_PORT=$TARGET_PORT
            envsubst '${TARGET_PORT}' < /tmp/nginx.conf.template > /tmp/nginx.conf.final

            # 4. Verificar el resultado
            echo "Config generada:"
            cat /tmp/nginx.conf.final

            # 5. Copiar la config al nginx-server via SSH
            ssh -o StrictHostKeyChecking=no manuelsmc2004@10.0.1.3 "
              sudo tee /etc/nginx/sites-available/default > /dev/null
            " < /tmp/nginx.conf.final

            # 6. Recargar Nginx
            ssh -o StrictHostKeyChecking=no manuelsmc2004@10.0.1.3 "
              sudo nginx -t && sudo systemctl reload nginx
              echo 'Nginx actualizado correctamente con envsubst'
            "
